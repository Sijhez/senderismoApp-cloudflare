name = "senderismo-app"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[build]
command = "node scripts/build-templates.js"

[assets]
directory = "./public"

# Set these in the Cloudflare dashboard under Workers > Settings > Variables:
# MONGODB_URI = "mongodb+srv://user:pass@cluster.mongodb.net/senderismoapp"
# SESSION = "your-session-secret"
